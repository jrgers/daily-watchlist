name: Daily Watchlist — Fetch Market Data

on:
  schedule:
    - cron: '30 12 * * 1-5'  # M-F 12:30 UTC (8:30am ET) — 1hr before market open
  workflow_dispatch:          # Manual trigger for testing

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python fetch_watchlist_data.py

      - name: Commit market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist_input.json
          git diff --staged --quiet || git commit -m "chore: update watchlist market data [skip ci]"
          git push
