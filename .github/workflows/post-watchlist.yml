name: Post Watchlist — Email + Discord

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'watchlist.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge agent branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge --no-ff origin/${{ github.ref_name }} -m "chore: merge watchlist into main [skip ci]"
          git push origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post watchlist
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python post_watchlist.py
